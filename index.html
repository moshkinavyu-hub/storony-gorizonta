<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Тренажёр: Стороны горизонта (4 класс)</title>
<style>
body {
    font-family: Arial, sans-serif;
    background: #f2f6ff;
    padding: 20px;
}
h1 {
    color: #2c3e50;
}
.task {
    background: white;
    padding: 15px;
    margin-bottom: 15px;
    border-radius: 10px;
}
button {
    margin-top: 10px;
    padding: 8px 15px;
    font-size: 14px;
    border-radius: 8px;
    border: none;
    background: #4CAF50;
    color: white;
    cursor: pointer;
}
button:hover {
    background: #45a049;
}
.result {
    font-weight: bold;
    margin-top: 10px;
}
.correct {
    color: green;
}
.incorrect {
    color: red;
}
</style>
</head>

<body>

<h1>🧭 Тренажёр «Стороны горизонта» (4 класс)</h1>
<p>Выполни задания и проверь свои знания.</p>

<div class="task">
<h3>1️⃣ Где находится СЕВЕР?</h3>
<select id="q1">
<option value="">Выбери ответ</option>
<option value="a">Где восходит солнце</option>
<option value="b">Где заходит солнце</option>
<option value="c">Противоположно югу</option>
</select>
<div id="r1" class="result"></div>
</div>

<div class="task">
<h3>2️⃣ Какая сторона горизонта находится между севером и востоком?</h3>
<select id="q2">
<option value="">Выбери ответ</option>
<option value="a">Юго-восток</option>
<option value="b">Северо-восток</option>
<option value="c">Северо-запад</option>
</select>
<div id="r2" class="result"></div>
</div>

<div class="task">
<h3>3️⃣ Солнце встаёт на…</h3>
<select id="q3">
<option value="">Выбери ответ</option>
<option value="a">севере</option>
<option value="b">западе</option>
<option value="c">востоке</option>
</select>
<div id="r3" class="result"></div>
</div>

<div class="task">
<h3>4️⃣ Если ты смотришь на север, где будет запад?</h3>
<select id="q4">
<option value="">Выбери ответ</option>
<option value="a">справа</option>
<option value="b">слева</option>
<option value="c">сзади</option>
</select>
<div id="r4" class="result"></div>
</div>

<button onclick="check()">Проверить ответы</button>

<div id="final" class="result"></div>

<script>
function check() {
    let score = 0;

    if (q1.value === "c") {
        r1.innerHTML = "✔ Верно!";
        r1.className = "result correct";
        score++;
    } else {
        r1.innerHTML = "✘ Неверно. Север — противоположен югу.";
        r1.className = "result incorrect";
    }

    if (q2.value === "b") {
        r2.innerHTML = "✔ Верно!";
        r2.className = "result correct";
        score++;
    } else {
        r2.innerHTML = "✘ Неверно. Правильный ответ — северо-восток.";
        r2.className = "result incorrect";
    }

    if (q3.value === "c") {
        r3.innerHTML = "✔ Верно!";
        r3.className = "result correct";
        score++;
    } else {
        r3.innerHTML = "✘ Неверно. Солнце встаёт на востоке.";
        r3.className = "result incorrect";
    }

    if (q4.value === "b") {
        r4.innerHTML = "✔ Верно!";
        r4.className = "result correct";
        score++;
    } else {
        r4.innerHTML = "✘ Неверно. Запад будет слева.";
        r4.className = "result incorrect";
    }

    final.innerHTML = "🏆 Результат: " + score + " из 4";
}
</script>

</body>
</html>
